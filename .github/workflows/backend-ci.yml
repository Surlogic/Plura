name: Backend CI

on:
  pull_request:
    branches:
      - main
      - prod
    paths:
      - backend-java/**
      - .github/workflows/backend-ci.yml
      - .github/workflows/deploy-fly-backend.yml
  push:
    branches:
      - main
    paths:
      - backend-java/**
      - .github/workflows/backend-ci.yml
      - .github/workflows/deploy-fly-backend.yml
  workflow_dispatch:

jobs:
  test:
    name: Test backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Test backend
        working-directory: backend-java
        run: ./gradlew test
