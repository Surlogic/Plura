name: Deploy Backend to Fly

on:
  push:
    branches:
      - main
    paths:
      - backend-java/**
      - .github/workflows/deploy-fly-backend.yml
  workflow_dispatch:

concurrency:
  group: deploy-fly-backend
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy backend
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly
        run: flyctl deploy --config backend-java/fly.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
