name: plura-phase4-local

services:
  redis:
    image: redis:7.2-alpine
    container_name: plura-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: plura-meili
    environment:
      MEILI_NO_ANALYTICS: "true"
      MEILI_MASTER_KEY: "${MEILI_API_KEY:-plura-local-master-key}"
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:7700/health"]
      interval: 10s
      timeout: 3s
      retries: 10

  localstack:
    image: localstack/localstack:3.5
    container_name: plura-localstack
    profiles: ["sqs"]
    environment:
      SERVICES: sqs
      AWS_DEFAULT_REGION: us-east-1
      LS_LOG: warn
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack

volumes:
  meili_data:
  localstack_data:
