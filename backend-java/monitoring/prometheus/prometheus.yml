global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/provider_operation_alerts.yml

scrape_configs:
  - job_name: plura-backend
    metrics_path: /internal/ops/actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:3000
    http_headers:
      X-Internal-Token:
        files:
          - /etc/prometheus/secrets/internal_token
