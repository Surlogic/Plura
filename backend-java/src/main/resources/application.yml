server:
  address: ${SERVER_ADDRESS:0.0.0.0}
  port: ${PORT:3000}
  tomcat:
    relaxed-query-chars: '[,],{,},|'
    relaxed-path-chars: '[,],{,},|'
  compression:
    enabled: ${SERVER_COMPRESSION_ENABLED:true}
    min-response-size: ${SERVER_COMPRESSION_MIN_RESPONSE_SIZE:1024}
    mime-types: ${SERVER_COMPRESSION_MIME_TYPES:text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,application/xml}
  http2:
    enabled: ${SERVER_HTTP2_ENABLED:true}
  servlet:
    session:
      timeout: ${SERVER_SESSION_TIMEOUT:15m}
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: ${SPRING_SHUTDOWN_TIMEOUT_PER_PHASE:30s}
  mail:
    host: ${EMAIL_SMTP_HOST:}
    port: ${EMAIL_SMTP_PORT:587}
    username: ${EMAIL_SMTP_USERNAME:}
    password: ${EMAIL_SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${EMAIL_SMTP_AUTH:true}
          starttls:
            enable: ${EMAIL_SMTP_STARTTLS_ENABLE:true}
          connectiontimeout: ${EMAIL_SMTP_CONNECTION_TIMEOUT_MS:5000}
          timeout: ${EMAIL_SMTP_TIMEOUT_MS:10000}
          writetimeout: ${EMAIL_SMTP_WRITE_TIMEOUT_MS:10000}
  datasource:
    # Runtime real: PostgreSQL obligatorio.
    # Puede entrar como SPRING_DATASOURCE_URL o como DATABASE_URL y el bootstrap
    # lo normaliza a JDBC si viene en formato postgres://.
    url: ${SPRING_DATASOURCE_URL:${DATABASE_URL:}}
    username: ${SPRING_DATASOURCE_USERNAME:${DATABASE_USERNAME:}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DATABASE_PASSWORD:}}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:}
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:30}
      minimum-idle: ${HIKARI_MIN_IDLE:5}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-init-sql: ${HIKARI_CONNECTION_INIT_SQL:SELECT set_config('statement_timeout','30s',false), set_config('idle_in_transaction_session_timeout','60s',false), set_config('lock_timeout','5s',false), set_config('search_path','public,extensions',false)}
  jackson:
    time-zone: ${APP_TIMEZONE:America/Montevideo}
  jpa:
    hibernate:
      # Producción: validate. Desarrollo: setear SPRING_JPA_DDL_AUTO=update en .env
      ddl-auto: ${SPRING_JPA_DDL_AUTO:validate}
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        globally_quoted_identifiers: true
        globally_quoted_identifiers_skip_column_definitions: true
        jdbc:
          time_zone: ${APP_TIMEZONE:America/Montevideo}
          batch_size: ${HIBERNATE_JDBC_BATCH_SIZE:30}
        order_inserts: true
        order_updates: true
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    url: ${SPRING_FLYWAY_URL:${SPRING_DATASOURCE_URL:${DATABASE_URL:}}}
    user: ${SPRING_FLYWAY_USER:${SPRING_DATASOURCE_USERNAME:${DATABASE_USERNAME:}}}
    password: ${SPRING_FLYWAY_PASSWORD:${SPRING_DATASOURCE_PASSWORD:${DATABASE_PASSWORD:}}}
    driver-class-name: ${SPRING_FLYWAY_DRIVER_CLASS_NAME:${SPRING_DATASOURCE_DRIVER_CLASS_NAME:}}
    locations: ${SPRING_FLYWAY_LOCATIONS:classpath:db/migration}
    baseline-on-migrate: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
    baseline-version: ${SPRING_FLYWAY_BASELINE_VERSION:0}
    validate-on-migrate: ${SPRING_FLYWAY_VALIDATE_ON_MIGRATE:false}  # protegido por env, por defecto desactivado

jwt:
  secret: ${JWT_SECRET}
  issuer: ${JWT_ISSUER:plura}
  expiration-minutes: ${JWT_EXPIRATION_MINUTES:30}
  refresh-days: ${JWT_REFRESH_DAYS:30}
  # Sin default: la app falla en startup si no está configurado.
  refresh-pepper: ${JWT_REFRESH_PEPPER}

oauth:
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    android-client-id: ${GOOGLE_ANDROID_CLIENT_ID:}
    ios-client-id: ${GOOGLE_IOS_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
  apple:
    client-id: ${APPLE_CLIENT_ID:}

cache:
  enabled: ${CACHE_ENABLED:true}

redis:
  enabled: ${REDIS_ENABLED:false}
  host: ${REDIS_HOST:localhost}
  port: ${REDIS_PORT:6379}
  password: ${REDIS_PASSWORD:}
  ttl-seconds: ${REDIS_TTL_SECONDS:300}

feature:
  cache:
    search-enabled: ${SEARCH_CACHE_ENABLED:true}
    suggest-enabled: ${SUGGEST_CACHE_ENABLED:true}
    profile-enabled: ${PROFILE_CACHE_ENABLED:true}
    slots-enabled: ${SLOTS_CACHE_ENABLED:true}
  search:
    no-count-mode-enabled: ${SEARCH_NO_COUNT_MODE:true}
    has-availability-today-enabled: ${HAS_AVAILABILITY_TODAY_ENABLED:false}
    availability-source: ${SEARCH_AVAILABILITY_SOURCE:FLAG}
  availability:
    slot-rebuild-enabled: ${AVAILABLE_SLOT_REBUILD_ENABLED:true}
    summary-enabled: ${SCHEDULE_SUMMARY_ENABLED:false}
    next-available-at-enabled: ${NEXT_AVAILABLE_AT_ENABLED:false}

app:
  # Zona horaria única del sistema (MVP). Slots y reservas se calculan en esta zona.
  timezone: ${APP_TIMEZONE:America/Montevideo}
  email:
    delivery-enabled: ${EMAIL_DELIVERY_ENABLED:false}
    from-address: ${EMAIL_FROM_ADDRESS:}
    from-name: ${EMAIL_FROM_NAME:Plura}
    reply-to: ${EMAIL_REPLY_TO:}
    public-web-url: ${APP_PUBLIC_WEB_URL:http://localhost:3002}
    brand-name: ${APP_BRAND_NAME:Plura}
  ops:
    internal-token: ${OPS_INTERNAL_TOKEN:}
    admin-client-email: ${OPS_ADMIN_CLIENT_EMAIL:admin@surlogicuy.com}
  mapbox:
    token: ${MAPBOX_TOKEN:${NEXT_PUBLIC_MAPBOX_TOKEN:}}
  search:
    # Recalcula la agenda de slots disponibles diariamente.
    slot-rebuild-cron: ${APP_SEARCH_SLOT_REBUILD_CRON:0 */30 2-6 * * *}
    slot-rebuild-shards: ${APP_SEARCH_SLOT_REBUILD_SHARDS:8}
    # Días a recalcular en la corrida nocturna.
    slot-rebuild-days: ${APP_SEARCH_SLOT_REBUILD_DAYS:30}
    # En scale-out evitar rebuild bootstrap por instancia salvo que se necesite rehidratar la agenda.
    slot-bootstrap-enabled: ${APP_SEARCH_SLOT_BOOTSTRAP_ENABLED:false}
    slot-bootstrap-days: ${APP_SEARCH_SLOT_BOOTSTRAP_DAYS:7}
    materialized-view:
      refresh-enabled: ${SEARCH_MV_REFRESH_ENABLED:true}
      # Evita refresh concurrente por cada instancia al levantar.
      refresh-on-startup: ${SEARCH_MV_REFRESH_ON_STARTUP:true}
      refresh-cron: ${SEARCH_MV_REFRESH_CRON:0 */30 * * * *}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3002}
    max-age-seconds: ${CORS_MAX_AGE_SECONDS:86400}
  auth:
    cookie-secure: ${AUTH_COOKIE_SECURE:true}
    cookie-same-site: ${AUTH_COOKIE_SAMESITE:Strict}
    expose-access-token: ${AUTH_EXPOSE_ACCESS_TOKEN:false}
    # Compatibilidad transitoria para access tokens emitidos antes de sid/sv.
    # Desactivar cuando haya pasado al menos el TTL máximo de access tokens legacy.
    allow-legacy-jwt: ${AUTH_ALLOW_LEGACY_JWT:true}
    # En scale-out la ruta legacy agrega lookup extra sobre auth_refresh_token.
    # Mantenerla solo si sigue habiendo sesiones previas al modelo auth_session.
    allow-legacy-refresh-fallback: ${AUTH_ALLOW_LEGACY_REFRESH_FALLBACK:false}
    password-reset:
      ttl-minutes: ${AUTH_PASSWORD_RESET_TTL_MINUTES:30}
      public-base-url: ${AUTH_PASSWORD_RESET_PUBLIC_BASE_URL:http://localhost:3002}
      pepper: ${AUTH_PASSWORD_RESET_PEPPER:${JWT_REFRESH_PEPPER}}
    email-verification:
      ttl-minutes: ${AUTH_EMAIL_VERIFICATION_TTL_MINUTES:15}
      cooldown-seconds: ${AUTH_EMAIL_VERIFICATION_COOLDOWN_SECONDS:60}
      max-attempts: ${AUTH_EMAIL_VERIFICATION_MAX_ATTEMPTS:5}
      pepper: ${AUTH_EMAIL_VERIFICATION_PEPPER:${JWT_REFRESH_PEPPER}}
    phone-verification:
      ttl-minutes: ${AUTH_PHONE_VERIFICATION_TTL_MINUTES:10}
      cooldown-seconds: ${AUTH_PHONE_VERIFICATION_COOLDOWN_SECONDS:60}
      max-attempts: ${AUTH_PHONE_VERIFICATION_MAX_ATTEMPTS:5}
      pepper: ${AUTH_PHONE_VERIFICATION_PEPPER:${JWT_REFRESH_PEPPER}}
    otp-challenge:
      ttl-minutes: ${AUTH_OTP_CHALLENGE_TTL_MINUTES:10}
      cooldown-seconds: ${AUTH_OTP_CHALLENGE_COOLDOWN_SECONDS:60}
      max-attempts: ${AUTH_OTP_CHALLENGE_MAX_ATTEMPTS:5}
      pepper: ${AUTH_OTP_CHALLENGE_PEPPER:${JWT_REFRESH_PEPPER}}
    abuse:
      login:
        window-seconds: ${AUTH_ABUSE_LOGIN_WINDOW_SECONDS:900}
        max-failures: ${AUTH_ABUSE_LOGIN_MAX_FAILURES:5}
        base-block-seconds: ${AUTH_ABUSE_LOGIN_BASE_BLOCK_SECONDS:30}
        max-block-seconds: ${AUTH_ABUSE_LOGIN_MAX_BLOCK_SECONDS:900}
      register:
        window-seconds: ${AUTH_ABUSE_REGISTER_WINDOW_SECONDS:1800}
        max-per-email: ${AUTH_ABUSE_REGISTER_MAX_PER_EMAIL:8}
        max-per-email-ip: ${AUTH_ABUSE_REGISTER_MAX_PER_EMAIL_IP:5}
      password-reset:
        window-seconds: ${AUTH_ABUSE_PASSWORD_RESET_WINDOW_SECONDS:1800}
        max-per-email: ${AUTH_ABUSE_PASSWORD_RESET_MAX_PER_EMAIL:6}
        max-per-email-ip: ${AUTH_ABUSE_PASSWORD_RESET_MAX_PER_EMAIL_IP:4}
      verify-email-send:
        window-seconds: ${AUTH_ABUSE_VERIFY_EMAIL_SEND_WINDOW_SECONDS:900}
        max-per-user: ${AUTH_ABUSE_VERIFY_EMAIL_SEND_MAX_PER_USER:6}
        max-per-user-ip: ${AUTH_ABUSE_VERIFY_EMAIL_SEND_MAX_PER_USER_IP:4}
      verify-email-confirm:
        window-seconds: ${AUTH_ABUSE_VERIFY_EMAIL_CONFIRM_WINDOW_SECONDS:900}
        max-per-user: ${AUTH_ABUSE_VERIFY_EMAIL_CONFIRM_MAX_PER_USER:10}
        max-per-user-ip: ${AUTH_ABUSE_VERIFY_EMAIL_CONFIRM_MAX_PER_USER_IP:6}
      verify-phone-send:
        window-seconds: ${AUTH_ABUSE_VERIFY_PHONE_SEND_WINDOW_SECONDS:900}
        max-per-user: ${AUTH_ABUSE_VERIFY_PHONE_SEND_MAX_PER_USER:5}
        max-per-user-ip: ${AUTH_ABUSE_VERIFY_PHONE_SEND_MAX_PER_USER_IP:3}
      verify-phone-confirm:
        window-seconds: ${AUTH_ABUSE_VERIFY_PHONE_CONFIRM_WINDOW_SECONDS:900}
        max-per-user: ${AUTH_ABUSE_VERIFY_PHONE_CONFIRM_MAX_PER_USER:10}
        max-per-user-ip: ${AUTH_ABUSE_VERIFY_PHONE_CONFIRM_MAX_PER_USER_IP:6}
      challenge-send:
        window-seconds: ${AUTH_ABUSE_CHALLENGE_SEND_WINDOW_SECONDS:900}
        max-per-user: ${AUTH_ABUSE_CHALLENGE_SEND_MAX_PER_USER:5}
        max-per-user-ip: ${AUTH_ABUSE_CHALLENGE_SEND_MAX_PER_USER_IP:3}
      challenge-verify:
        window-seconds: ${AUTH_ABUSE_CHALLENGE_VERIFY_WINDOW_SECONDS:900}
        max-per-user: ${AUTH_ABUSE_CHALLENGE_VERIFY_MAX_PER_USER:10}
        max-per-user-ip: ${AUTH_ABUSE_CHALLENGE_VERIFY_MAX_PER_USER_IP:6}
      refresh:
        window-seconds: ${AUTH_ABUSE_REFRESH_WINDOW_SECONDS:300}
        max-per-user: ${AUTH_ABUSE_REFRESH_MAX_PER_USER:30}
        max-per-ip: ${AUTH_ABUSE_REFRESH_MAX_PER_IP:60}
    oauth:
      google:
        allow-direct-token: ${AUTH_OAUTH_GOOGLE_ALLOW_DIRECT_TOKEN:true}
        allowed-redirect-uris: ${AUTH_OAUTH_GOOGLE_ALLOWED_REDIRECT_URIS:}
  security:
    # Solo habilitar en edge/proxy confiable que sobreescriba headers.
    trust-forwarded-headers: ${APP_TRUST_FORWARDED_HEADERS:false}
    rate-limit-enabled: ${APP_RATE_LIMIT_ENABLED:true}
  observability:
    query-count-header-enabled: ${QUERY_COUNT_HEADER_ENABLED:false}
  storage:
    upload-dir: ${APP_UPLOAD_DIR:uploads}
    provider: ${IMAGE_STORAGE_PROVIDER:${STORAGE_PROVIDER:local}}
    public-base-url: ${STORAGE_PUBLIC_BASE_URL:/uploads}
    local-base-dir: ${STORAGE_LOCAL_BASE_DIR:./uploads}
    upload-url-expiration-minutes: ${IMAGE_UPLOAD_URL_EXPIRATION_MINUTES:10}
    max-upload-bytes: ${IMAGE_MAX_UPLOAD_BYTES:5242880}
    allowed-content-types: ${IMAGE_ALLOWED_CONTENT_TYPES:image/jpeg,image/png,image/webp,image/avif}
    r2:
      endpoint: ${R2_ENDPOINT:}
      bucket: ${R2_BUCKET:plura-images}
      region: ${R2_REGION:auto}
      access-key-id: ${R2_ACCESS_KEY_ID:}
      secret-access-key: ${R2_SECRET_ACCESS_KEY:}
      public-base-url: ${R2_PUBLIC_BASE_URL:}

  sqs:
    enabled: ${SQS_ENABLED:false}
    endpoint: ${SQS_ENDPOINT:}
    region: ${SQS_REGION:us-east-1}
    access-key-id: ${SQS_ACCESS_KEY_ID:}
    secret-access-key: ${SQS_SECRET_ACCESS_KEY:}
    queue-url: ${SQS_QUEUE_URL:}
    dlq-url: ${SQS_DLQ_URL:}
    wait-time-seconds: ${SQS_WAIT_TIME_SECONDS:10}
    max-messages: ${SQS_MAX_MESSAGES:10}

  search-engine:
    enabled: ${SEARCH_ENGINE_ENABLED:false}
    suggest-enabled: ${SEARCH_ENGINE_SUGGEST_ENABLED:false}
    hydrate-from-db: ${SEARCH_ENGINE_HYDRATE_FROM_DB:true}
    provider: ${SEARCH_ENGINE_PROVIDER:MEILI}
    meili:
      host: ${MEILI_HOST:http://localhost:7700}
      api-key: ${MEILI_API_KEY:}
      index-name: ${MEILI_INDEX_NAME:professional_profile}
      timeout-millis: ${MEILI_TIMEOUT_MILLIS:2000}
      reindex-on-startup: ${MEILI_REINDEX_ON_STARTUP:false}

  availability:
    summary-lookahead-days: ${SCHEDULE_SUMMARY_LOOKAHEAD_DAYS:14}
    summary-cron: ${SCHEDULE_SUMMARY_CRON:0 0 2-6 * * *}

  billing:
    provider-operation-alerts:
      uncertain-older-than-minutes: ${APP_BILLING_PROVIDER_OPERATION_ALERTS_UNCERTAIN_OLDER_THAN_MINUTES:30}
      retryable-threshold: ${APP_BILLING_PROVIDER_OPERATION_ALERTS_RETRYABLE_THRESHOLD:10}
      lease-expired-grace-minutes: ${APP_BILLING_PROVIDER_OPERATION_ALERTS_LEASE_EXPIRED_GRACE_MINUTES:5}
      sample-limit: ${APP_BILLING_PROVIDER_OPERATION_ALERTS_SAMPLE_LIMIT:10}
      metrics-refresh-millis: ${APP_BILLING_PROVIDER_OPERATION_ALERTS_METRICS_REFRESH_MILLIS:30000}

  cache:
    search:
      max-size: ${APP_CACHE_SEARCH_MAX_SIZE:20000}
    suggest:
      max-size: ${APP_CACHE_SUGGEST_MAX_SIZE:20000}
    slots:
      max-size: ${APP_CACHE_SLOTS_MAX_SIZE:30000}
    profile:
      page-max-size: ${APP_CACHE_PROFILE_PAGE_MAX_SIZE:10000}
      summaries-max-size: ${APP_CACHE_PROFILE_SUMMARIES_MAX_SIZE:5000}

  async:
    geocoding:
      core-pool-size: ${APP_ASYNC_GEOCODING_CORE_POOL_SIZE:2}
      max-pool-size: ${APP_ASYNC_GEOCODING_MAX_POOL_SIZE:4}
      queue-capacity: ${APP_ASYNC_GEOCODING_QUEUE_CAPACITY:500}
    notification-email:
      core-pool-size: ${APP_ASYNC_NOTIFICATION_EMAIL_CORE_POOL_SIZE:4}
      max-pool-size: ${APP_ASYNC_NOTIFICATION_EMAIL_MAX_POOL_SIZE:12}
      queue-capacity: ${APP_ASYNC_NOTIFICATION_EMAIL_QUEUE_CAPACITY:500}
    billing-webhook:
      core-pool-size: ${APP_ASYNC_BILLING_WEBHOOK_CORE_POOL_SIZE:4}
      max-pool-size: ${APP_ASYNC_BILLING_WEBHOOK_MAX_POOL_SIZE:16}
      queue-capacity: ${APP_ASYNC_BILLING_WEBHOOK_QUEUE_CAPACITY:500}

jobs:
  sqs:
    thumbnail-enabled: ${THUMBNAIL_SQS_ENABLED:false}
    schedule-summary-enabled: ${SCHEDULE_SUMMARY_SQS_ENABLED:false}
    search-index-enabled: ${SEARCH_INDEX_SQS_ENABLED:false}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    # Deshabilitado por defecto. Desarrollo: setear SWAGGER_ENABLED=true en .env
    enabled: ${SWAGGER_ENABLED:false}
  api-docs:
    enabled: ${SWAGGER_ENABLED:false}

management:
  endpoints:
    web:
      base-path: /internal/ops/actuator
      exposure:
        include: health,metrics,prometheus,scheduledtasks
  endpoint:
    health:
      probes:
        enabled: true
      show-components: always
      show-details: always
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}

billing:
  enabled: ${BILLING_ENABLED:false}
  mode: ${BILLING_MODE:sandbox}
  provider-verification-enabled: ${BILLING_PROVIDER_VERIFICATION_ENABLED:true}
  webhook-allowed-skew-seconds: ${BILLING_WEBHOOK_ALLOWED_SKEW_SECONDS:300}
  webhook-base-url: ${BILLING_WEBHOOK_BASE_URL:}
  plans:
    plan-basic:
      price: ${BILLING_PLAN_BASIC_PRICE:0}
      currency: ${BILLING_PLAN_BASIC_CURRENCY:UYU}
    plan-profesional:
      price: ${BILLING_PLAN_PROFESIONAL_PRICE:${BILLING_PLAN_PRO_PRICE:0}}
      currency: ${BILLING_PLAN_PROFESIONAL_CURRENCY:${BILLING_PLAN_PRO_CURRENCY:UYU}}
    plan-enterprise:
      price: ${BILLING_PLAN_ENTERPRISE_PRICE:${BILLING_PLAN_PREMIUM_PRICE:0}}
      currency: ${BILLING_PLAN_ENTERPRISE_CURRENCY:${BILLING_PLAN_PREMIUM_CURRENCY:UYU}}
  mercadopago:
    enabled: ${BILLING_MERCADOPAGO_ENABLED:false}
    base-url: ${BILLING_MERCADOPAGO_BASE_URL:https://api.mercadopago.com}
    preapproval-plan-path: ${BILLING_MERCADOPAGO_PREAPPROVAL_PLAN_PATH:/preapproval_plan}
    preapproval-path: ${BILLING_MERCADOPAGO_PREAPPROVAL_PATH:/preapproval}
    cancel-path: ${BILLING_MERCADOPAGO_CANCEL_PATH:/preapproval/{id}}
    subscription-status-path: ${BILLING_MERCADOPAGO_SUBSCRIPTION_STATUS_PATH:/preapproval/{id}}
    reservation-preference-path: ${BILLING_MERCADOPAGO_RESERVATION_PREFERENCE_PATH:/checkout/preferences}
    reservation-payment-status-path: ${BILLING_MERCADOPAGO_RESERVATION_PAYMENT_STATUS_PATH:/v1/payments/{id}}
    reservation-payment-search-path: ${BILLING_MERCADOPAGO_RESERVATION_PAYMENT_SEARCH_PATH:/v1/payments/search}
    reservation-refund-path: ${BILLING_MERCADOPAGO_RESERVATION_REFUND_PATH:/v1/payments/{id}/refunds}
    sandbox-only-body-signature-fallback: ${BILLING_MERCADOPAGO_SANDBOX_ONLY_BODY_SIGNATURE_FALLBACK:false}
    subscription-back-url: ${BILLING_MERCADOPAGO_SUBSCRIPTION_BACK_URL:}
    success-url: ${BILLING_MERCADOPAGO_SUCCESS_URL:}
    failure-url: ${BILLING_MERCADOPAGO_FAILURE_URL:}
    pending-url: ${BILLING_MERCADOPAGO_PENDING_URL:}
    plan-basic-id: ${BILLING_MERCADOPAGO_PLAN_BASIC_ID:}
    plan-profesional-id: ${BILLING_MERCADOPAGO_PLAN_PROFESIONAL_ID:}
    plan-enterprise-id: ${BILLING_MERCADOPAGO_PLAN_ENTERPRISE_ID:}
    timeout-millis: ${BILLING_MERCADOPAGO_TIMEOUT_MILLIS:5000}
    subscriptions:
      access-token: ${BILLING_MERCADOPAGO_SUBSCRIPTIONS_ACCESS_TOKEN:${BILLING_MERCADOPAGO_ACCESS_TOKEN:${MP_ACCESS_TOKEN:}}}
      webhook-secret: ${BILLING_MERCADOPAGO_SUBSCRIPTIONS_WEBHOOK_SECRET:${BILLING_MERCADOPAGO_WEBHOOK_SECRET:${MP_WEBHOOK_SECRET:}}}
    reservations:
      platform-access-token: ${BILLING_MERCADOPAGO_RESERVATIONS_PLATFORM_ACCESS_TOKEN:${BILLING_MERCADOPAGO_ACCESS_TOKEN:${MP_ACCESS_TOKEN:}}}
      webhook-secret: ${BILLING_MERCADOPAGO_RESERVATIONS_WEBHOOK_SECRET:${BILLING_MERCADOPAGO_WEBHOOK_SECRET:${MP_WEBHOOK_SECRET:}}}
      processing-fee:
        enabled: ${BILLING_MERCADOPAGO_RESERVATIONS_PROCESSING_FEE_ENABLED:true}
        label: ${BILLING_MERCADOPAGO_RESERVATIONS_PROCESSING_FEE_LABEL:Cargo de procesamiento}
        instant-provider-fee-percent: ${BILLING_MERCADOPAGO_RESERVATIONS_PROCESSING_FEE_INSTANT_PROVIDER_FEE_PERCENT:${BILLING_MERCADOPAGO_RESERVATIONS_PROCESSING_FEE_PROVIDER_FEE_PERCENT:5.99}}
        delayed-provider-fee-percent: ${BILLING_MERCADOPAGO_RESERVATIONS_PROCESSING_FEE_DELAYED_PROVIDER_FEE_PERCENT:4.99}
        tax-percent: ${BILLING_MERCADOPAGO_RESERVATIONS_PROCESSING_FEE_TAX_PERCENT:22}
        platform-fee-percent: ${BILLING_MERCADOPAGO_RESERVATIONS_PROCESSING_FEE_PLATFORM_FEE_PERCENT:1.00}
      oauth:
        client-id: ${BILLING_MERCADOPAGO_RESERVATIONS_OAUTH_CLIENT_ID:${BILLING_MERCADOPAGO_OAUTH_CLIENT_ID:}}
        client-secret: ${BILLING_MERCADOPAGO_RESERVATIONS_OAUTH_CLIENT_SECRET:${BILLING_MERCADOPAGO_OAUTH_CLIENT_SECRET:}}
        redirect-uri: ${BILLING_MERCADOPAGO_RESERVATIONS_OAUTH_REDIRECT_URI:${BILLING_MERCADOPAGO_OAUTH_REDIRECT_URI:}}
        frontend-redirect-url: ${BILLING_MERCADOPAGO_RESERVATIONS_OAUTH_FRONTEND_REDIRECT_URL:${BILLING_MERCADOPAGO_OAUTH_FRONTEND_REDIRECT_URL:}}
        authorization-url: ${BILLING_MERCADOPAGO_RESERVATIONS_OAUTH_AUTHORIZATION_URL:${BILLING_MERCADOPAGO_OAUTH_AUTHORIZATION_URL:https://auth.mercadopago.com/authorization}}
        token-url: ${BILLING_MERCADOPAGO_RESERVATIONS_OAUTH_TOKEN_URL:${BILLING_MERCADOPAGO_OAUTH_TOKEN_URL:https://api.mercadopago.com/oauth/token}}
