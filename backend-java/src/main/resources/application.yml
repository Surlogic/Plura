server:
  port: 3000

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_DDL_AUTO:update}
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        globally_quoted_identifiers: true

jwt:
  secret: ${JWT_SECRET}
  issuer: ${JWT_ISSUER:plura}
  expiration-minutes: ${JWT_EXPIRATION_MINUTES:30}
  refresh-days: ${JWT_REFRESH_DAYS:30}
  refresh-pepper: ${JWT_REFRESH_PEPPER:}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3002}
  auth:
    cookie-secure: ${AUTH_COOKIE_SECURE:false}
    cookie-same-site: ${AUTH_COOKIE_SAMESITE:Lax}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
