name: plura-dev

services:
  backend:
    image: eclipse-temurin:17-jdk-jammy
    working_dir: /workspace/backend-java
    env_file:
      - .env.backend
      - backend-java/.env
    volumes:
      - ./:/workspace
      - gradle_cache:/root/.gradle
    ports:
      - "3000:3000"
    command: >
      sh -lc "chmod +x ./gradlew && SPRING_FLYWAY_VALIDATE_ON_MIGRATE=false ./gradlew bootRun"

  web:
    image: node:20-bookworm-slim
    working_dir: /workspace
    depends_on:
      - backend
    env_file:
      - .env.frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      PNPM_STORE_PATH: /pnpm-store
    volumes:
      - ./:/workspace
      - pnpm_store:/pnpm-store
      - root_node_modules:/workspace/node_modules
      - web_node_modules:/workspace/apps/web/node_modules
    ports:
      - "3002:3002"
    command: >
      sh -lc "corepack enable && corepack prepare pnpm@10.23.0 --activate && pnpm install --frozen-lockfile && pnpm -C apps/web dev"

volumes:
  gradle_cache:
  pnpm_store:
  root_node_modules:
  web_node_modules:
