services:
  - type: web
    name: plura-api
    runtime: docker
    rootDir: backend-java
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 3000
      - key: APP_TIMEZONE
        value: America/Montevideo
      - key: APP_PUBLIC_WEB_URL
        sync: false
      - key: APP_TRUST_FORWARDED_HEADERS
        value: true
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://aws-1-sa-east-1.pooler.supabase.com:5432/postgres
      - key: SPRING_DATASOURCE_USERNAME
        value: postgres.owzzpcnuzzekqvqdimpr
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: SPRING_DATASOURCE_DRIVER_CLASS_NAME
        value: org.postgresql.Driver
      - key: SPRING_FLYWAY_URL
        value: jdbc:postgresql://aws-1-sa-east-1.pooler.supabase.com:5432/postgres
      - key: SPRING_FLYWAY_USER
        value: postgres.owzzpcnuzzekqvqdimpr
      - key: SPRING_FLYWAY_PASSWORD
        sync: false
      - key: SPRING_FLYWAY_DRIVER_CLASS_NAME
        value: org.postgresql.Driver
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_PEPPER
        sync: false
      - key: AUTH_COOKIE_SECURE
        value: true
      - key: AUTH_COOKIE_SAMESITE
        value: None
      - key: AUTH_EXPOSE_ACCESS_TOKEN
        sync: false
      - key: AUTH_OAUTH_GOOGLE_ALLOWED_REDIRECT_URIS
        sync: false
      - key: AUTH_PASSWORD_RESET_PUBLIC_BASE_URL
        sync: false
      - key: JWT_EXPIRATION_MINUTES
        value: 30
      - key: SPRING_JPA_DDL_AUTO
        value: validate
      - key: SPRING_FLYWAY_VALIDATE_ON_MIGRATE
        value: false
      - key: SWAGGER_ENABLED
        value: false
      - key: LOG_LEVEL_ROOT
        value: INFO
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: APPLE_CLIENT_ID
        sync: false
      - key: EMAIL_DELIVERY_ENABLED
        sync: false
      - key: EMAIL_FROM_ADDRESS
        sync: false
      - key: EMAIL_FROM_NAME
        sync: false
      - key: EMAIL_REPLY_TO
        sync: false
      - key: EMAIL_SMTP_HOST
        sync: false
      - key: EMAIL_SMTP_PORT
        sync: false
      - key: EMAIL_SMTP_USERNAME
        sync: false
      - key: EMAIL_SMTP_PASSWORD
        sync: false
      - key: EMAIL_SMTP_AUTH
        sync: false
      - key: EMAIL_SMTP_STARTTLS_ENABLE
        sync: false
      - key: EMAIL_SMTP_CONNECTION_TIMEOUT_MS
        sync: false
      - key: EMAIL_SMTP_TIMEOUT_MS
        sync: false
      - key: EMAIL_SMTP_WRITE_TIMEOUT_MS
        sync: false
      - key: BILLING_ENABLED
        sync: false
      - key: BILLING_MODE
        sync: false
      - key: BILLING_PROVIDER_VERIFICATION_ENABLED
        sync: false
      - key: BILLING_WEBHOOK_BASE_URL
        sync: false
      - key: BILLING_PLAN_BASIC_PRICE
        sync: false
      - key: BILLING_PLAN_BASIC_CURRENCY
        sync: false
      - key: BILLING_PLAN_PROFESIONAL_PRICE
        sync: false
      - key: BILLING_PLAN_PROFESIONAL_CURRENCY
        sync: false
      - key: BILLING_PLAN_ENTERPRISE_PRICE
        sync: false
      - key: BILLING_PLAN_ENTERPRISE_CURRENCY
        sync: false
      - key: BILLING_MERCADOPAGO_ENABLED
        sync: false
      - key: BILLING_MERCADOPAGO_SUBSCRIPTIONS_ACCESS_TOKEN
        sync: false
      - key: BILLING_MERCADOPAGO_SUBSCRIPTIONS_WEBHOOK_SECRET
        sync: false
      - key: BILLING_MERCADOPAGO_RESERVATIONS_PLATFORM_ACCESS_TOKEN
        sync: false
      - key: BILLING_MERCADOPAGO_RESERVATIONS_WEBHOOK_SECRET
        sync: false
      - key: BILLING_MERCADOPAGO_RESERVATIONS_OAUTH_CLIENT_ID
        sync: false
      - key: BILLING_MERCADOPAGO_RESERVATIONS_OAUTH_CLIENT_SECRET
        sync: false
      - key: BILLING_MERCADOPAGO_RESERVATIONS_OAUTH_REDIRECT_URI
        sync: false
      - key: BILLING_MERCADOPAGO_RESERVATIONS_OAUTH_FRONTEND_REDIRECT_URL
        sync: false
      - key: BILLING_MERCADOPAGO_RESERVATIONS_OAUTH_AUTHORIZATION_URL
        sync: false
      - key: BILLING_MERCADOPAGO_RESERVATIONS_OAUTH_TOKEN_URL
        sync: false
      - key: BILLING_MERCADOPAGO_RESERVATIONS_OAUTH_STATE_SIGNING_SECRET
        sync: false
      - key: BILLING_MERCADOPAGO_RESERVATIONS_OAUTH_TOKEN_ENCRYPTION_KEY
        sync: false
      - key: BILLING_MERCADOPAGO_RESERVATIONS_OAUTH_PKCE_ENABLED
        sync: false
      - key: BILLING_MERCADOPAGO_ACCESS_TOKEN
        sync: false
      - key: BILLING_MERCADOPAGO_WEBHOOK_SECRET
        sync: false
      - key: BILLING_MERCADOPAGO_SUBSCRIPTION_BACK_URL
        sync: false
      - key: BILLING_MERCADOPAGO_SUCCESS_URL
        sync: false
      - key: BILLING_MERCADOPAGO_FAILURE_URL
        sync: false
      - key: BILLING_MERCADOPAGO_PENDING_URL
        sync: false
      - key: BILLING_MERCADOPAGO_OAUTH_CLIENT_ID
        sync: false
      - key: BILLING_MERCADOPAGO_OAUTH_CLIENT_SECRET
        sync: false
      - key: BILLING_MERCADOPAGO_OAUTH_REDIRECT_URI
        sync: false
      - key: BILLING_MERCADOPAGO_OAUTH_AUTHORIZATION_URL
        sync: false
      - key: BILLING_MERCADOPAGO_OAUTH_TOKEN_URL
        sync: false
      - key: BILLING_MERCADOPAGO_OAUTH_STATE_SIGNING_SECRET
        sync: false
      - key: BILLING_MERCADOPAGO_OAUTH_TOKEN_ENCRYPTION_KEY
        sync: false

  - type: web
    name: plura-web
    runtime: node
    rootDir: .
    buildCommand: corepack enable && corepack prepare pnpm@latest --activate && pnpm install --frozen-lockfile && SKIP_HOME_SSG_FETCH=true pnpm -C apps/web build
    startCommand: corepack enable && corepack prepare pnpm@10.23.0 --activate && NODE_ENV=production NEXT_BUILD_DIR=.next-build pnpm -C apps/web exec next start -p ${PORT}
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_GOOGLE_CLIENT_ID
        sync: false
      - key: NEXT_PUBLIC_APPLE_CLIENT_ID
        sync: false
      - key: NEXT_PUBLIC_APPLE_REDIRECT_URI
        sync: false
      - key: NEXT_PUBLIC_MAPBOX_TOKEN
        sync: false
